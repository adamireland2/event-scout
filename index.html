const {useState,useRef,useEffect,useCallback}=React;

const SYSTEM_PROMPT=`You are an elite event intelligence agent. Your sole mission is to find in-person events, conferences, and networking opportunities that will put your principal directly in front of decision makers who buy — or influence the purchase of — specialty tax incentive studies.

## WHO YOU WORK FOR
Your principal runs a specialty tax consulting practice selling: Cost Segregation Studies, 179D Energy Efficient Commercial Building Deductions, 45L Energy Efficient Home Credits, ITC/UTC (Investment Tax Credit / Utility Tax Credits), and R&D Tax Credit Studies.

## GEOGRAPHY
Home base: San Francisco Bay Area / San Jose, California. Also include major US cities. Always flag Bay Area events first.

## DECISION MAKERS TO FIND
Tier 1 (Direct Buyers): CRE developers/owners, RE investors/PE firms, manufacturing C-suite, CFOs/Tax Directors, software/SaaS founders, GCs, architects/engineers, renewable energy developers, multifamily builders.
Tier 2 (Referral Sources): CPAs/tax partners, RE/tax attorneys, wealth advisors, CRE brokers, construction lenders, property managers.
Tier 3 (Strategic): Economic development officials, association leaders, commercial insurance brokers.

## CRITICAL RULE: IN-PERSON EVENTS ONLY
ONLY recommend events with a physical venue. NEVER recommend webinars, virtual, online, Zoom, Teams, livestream, or digital events. If you cannot confirm a physical venue, SKIP IT.

## MEMBER ORGANIZATIONS
When member organizations are provided, search their websites and event calendars directly. Flag these as "Member Organization Event".

## OUTPUT FORMAT — STRICT JSON
You MUST output your results as a JSON array. No other text before or after. Each event is an object:
[
  {
    "name": "Event Name",
    "date": "Month Day, Year",
    "location": "City, State — Venue Name",
    "organizer": "Organizer Name",
    "link": "https://...",
    "format": "Conference",
    "cost": "$XX or TBD or Invite-only",
    "priority": "must-attend" | "strong-fit" | "worth-considering",
    "why": "2-3 sentence explanation",
    "decision_makers": "Who will be there",
    "services": ["Cost Seg", "179D", "45L", "ITC", "R&D"],
    "actions": ["Register by X", "Review speakers", "etc"],
    "member_org": false
  }
]

ONLY output valid JSON. No markdown, no commentary, no preamble. Just the JSON array.

## BEHAVIORAL RULES
1. IN-PERSON ONLY. 2. Verify events are real. 3. Quality over quantity. 4. Name names from speaker lists. 5. Flag sponsorship/speaking opportunities in actions. 6. Bundle events in same city. 7. Map to specific service lines. 8. Search member org calendars when provided.`;

  {id:"austin",label:"Austin"},{id:"portland",label:"Portland"},
];
const DATE_RANGES=[{id:"30",label:"Next 30 days"},{id:"60",label:"Next 60 days"},{id:"90",label:"Next 90 days"},{id:"180",label:"Next 6 months"},{id:"custom",label:"Custom dates"}];
const CATEGORIES=[
  {id:"cre",icon:"🏗️",label:"CRE & Construction",desc:"Commercial real estate, development, and construction conferences",base:"Find the best commercial real estate, construction, and development in-person conferences and networking events"},
  {id:"mfg",icon:"🏭",label:"Manufacturing & R&D",desc:"Manufacturing summits, innovation expos, and R&D events",base:"Find in-person manufacturing summits, innovation expos, and R&D-focused events where I can meet manufacturing company owners and CFOs"},
  {id:"tax",icon:"📊",label:"Tax & CPA Conferences",desc:"CPA society events, tax conferences, and accounting networking",base:"Find in-person CPA society events, tax conferences, and accounting industry networking events"},

const PRIORITY={
  "must-attend":{emoji:"🔴",label:"Must-Attend",bg:"#fef2f2",fg:"#dc2626",bd:"#fecaca"},
  "strong-fit":{emoji:"🟡",label:"Strong Fit",bg:"#fefce8",fg:"#a16207",bd:"#fde68a"},

/* ─── Parse events from AI response ─── */
function parseEvents(text){
  // Try JSON first
  try{
    const s=text.indexOf("["),e=text.lastIndexOf("]");
    if(s!==-1&&e>s){const p=JSON.parse(text.slice(s,e+1));if(Array.isArray(p)&&p.length>0)return p}
  }catch(e){}

  // Robust markdown parser
  const events=[];
  // Split on ### headers, --- dividers, or ## headers
  const blocks=text.split(/(?:^|\n)(?:#{2,3}\s+|\-{3,})/);

  for(const block of blocks){
    if(!block||block.trim().length<40)continue;

    // Extract field with **Key:** Value or **Key:** \n Value patterns
    const get=(keys)=>{
      for(const key of(Array.isArray(keys)?keys:[keys])){
        // Match **Key:** followed by value on same line or next line
        const rx=new RegExp("\\*\\*"+key+"\\s*:?\\*\\*:?\\s*(.+?)(?=\\n\\*\\*|\\n#{2,}|\\n-{3,}|$)","is");
        const m=block.match(rx);
        if(m&&m[1]){
          let v=m[1].trim().replace(/^\*+|\*+$/g,"").replace(/^#+\s*/,"").trim();
          if(v.length>2)return v;
        }
      }
      return "";
    };

    // Try to find event name from first meaningful line or bold text
    let name="";
    const nameMatch=block.match(/(?:^|\n)\s*\*?\*?\[?([A-Z][^\n\*\[]{8,80})/);
    const boldName=block.match(/\*\*\[?([^\*\]\n]{8,100})\]?\*\*/);
    const h3Name=block.match(/^([^\n\*#]{8,100})/);
    name=(boldName&&boldName[1])||
         (nameMatch&&nameMatch[1])||
         (h3Name&&h3Name[1])||"";
    name=name.replace(/\*+/g,"").replace(/^\[|\]$/g,"").replace(/\(http[^\)]+\)/g,"").trim();

    // Skip if this block is just intro/search narration
    if(!name||name.length<5)continue;
    if(/^(I'll|Let me|Based on|I found|I will|Here are|Looking|Searching)/i.test(name))continue;

    const date=get(["Date"]);
    const location=get(["Location"]);
    const organizer=get(["Produced by","Organizer"]);
    const link=get(["Link"]);
    const format=get(["Format"]);
    const cost=get(["Cost"]);
    const why=get(["Why this event","Why"]);
    const dm=get(["Decision makers likely in the room","Decision makers"]);
    const svc=get(["Relevant service lines","Services"]);
    const pStr=get(["Priority"]);
    const acts=get(["Action items","Actions","Action"]);

    // Must have at least a name and one other field to count
    if(!date&&!location&&!link&&!organizer)continue;

    // Find any URL in the block as fallback
    let url=link;
    if(!url){const um=block.match(/https?:\/\/[^\s\)\]>"]+/);if(um)url=um[0]}
    // Clean URL of trailing markdown
    if(url)url=url.replace(/[\]\)>\*]+$/,"").trim();

    const priority=pStr.includes("🔴")||pStr.toLowerCase().includes("must")?"must-attend":
                   pStr.includes("🟡")||pStr.toLowerCase().includes("strong")?"strong-fit":"worth-considering";

    const services=(svc||"").split(/[,·•]/).map(s=>s.replace(/\*+/g,"").trim()).filter(s=>s.length>1&&s.length<40);
    const actions=(acts||"").split(/(?:\n-|\n•|\n\d\.)/).map(s=>s.replace(/\*+/g,"").trim()).filter(s=>s.length>5);

    events.push({
      name:name.slice(0,120),
      date:date.replace(/\*+/g,"").slice(0,60),
      location:location.replace(/\*+/g,"").slice(0,100),
      organizer:organizer.replace(/\*+/g,"").slice(0,60),
      link:url||"",
      format:format.replace(/\*+/g,"").slice(0,30),
      cost:cost.replace(/\*+/g,"").slice(0,50),
      priority,
      why:why.replace(/\*+/g,"").slice(0,400),
      decision_makers:dm.replace(/\*+/g,"").slice(0,400),
      services,
      actions,
      member_org:block.toLowerCase().includes("member org"),
    });
  }
  return events;
}

/* ─── Google Calendar URL ─── */
function gcalUrl(ev){
  const title=encodeURIComponent(ev.name||"");
  const loc=encodeURIComponent(ev.location||"");
  const details=encodeURIComponent((ev.why||"")+"\n\n"+(ev.link||""));
  // Try to parse date for calendar
  let dates="";
  if(ev.date){
    try{
      const d=new Date(ev.date);
      if(!isNaN(d)){
        const fmt=(dt)=>dt.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
        const end=new Date(d.getTime()+8*60*60*1000);
        dates=fmt(d)+"/"+fmt(end);
      }
    }catch(e){}
  }
  return "https://calendar.google.com/calendar/render?action=TEMPLATE&text="+title+"&location="+loc+"&details="+details+(dates?"&dates="+dates:"");
}

/* ─── Print ─── */
function printEvents(events){
  const area=document.getElementById("print-area");
  area.innerHTML="<h1 style='font-size:20px;margin-bottom:16px;font-family:Inter,sans-serif'>Event Scout — Search Results</h1><p style='font-size:11px;color:#666;margin-bottom:20px'>Printed "+new Date().toLocaleDateString()+"</p>"+
    events.map(ev=>{
      const p=PRIORITY[ev.priority]||PRIORITY["worth-considering"];
      return "<div class='print-event'><div class='print-badge' style='background:"+p.bg+";color:"+p.fg+"'>"+p.emoji+" "+p.label+"</div><h3>"+
        (ev.name||"")+"</h3><p><b>Date:</b> "+(ev.date||"TBD")+" &nbsp;|&nbsp; <b>Location:</b> "+(ev.location||"TBD")+"</p><p><b>Organizer:</b> "+(ev.organizer||"")+" &nbsp;|&nbsp; <b>Format:</b> "+(ev.format||"")+" &nbsp;|&nbsp; <b>Cost:</b> "+(ev.cost||"TBD")+
        "</p><p>"+(ev.why||"")+"</p>"+(ev.link?"<p style='color:#6366f1'>"+ev.link+"</p>":"")+"<p><b>Services:</b> "+((ev.services||[]).join(", ")||"—")+"</p></div>";
    }).join("");
  area.style.display="block";
  window.print();
  setTimeout(()=>{area.style.display="none"},500);
}

/* ─── Query builder ─── */
function buildQuery(base,dateRange,customFrom,customTo,cities,memberships){
  let ds;
  if(dateRange==="custom"&&customFrom&&customTo){
    ds="between "+new Date(customFrom).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})+" and "+new Date(customTo).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
  } else { ds="in the next "+parseInt(dateRange)+" days"; }
  const cn=cities.map(id=>{const c=CITIES.find(x=>x.id===id);return c?c.label:null}).filter(Boolean);
  const cs=cn.length===CITIES.length?"all major US cities":cn.length>3?cn.slice(0,3).join(", ")+", and "+(cn.length-3)+" other cities":cn.join(" and ");
  let q=base+" "+ds+" in "+cs+". IN-PERSON EVENTS ONLY. Every event must have a physical venue. IMPORTANT: Return results as a JSON array. No other text — ONLY the JSON array.";
  if(memberships&&memberships.length>0){
    q+=" ALSO search these member organization event calendars: "+memberships.map(m=>m.name+(m.url?" ("+m.url+")":"")).join("; ")+".";
  }
  return q;
}

          <button onClick={onClose} style={ml.closeBtn}>✕</button>

          {[["📅","Date",ev.date],["📍","Location",ev.location],["🏢","Organizer",ev.organizer],["🎫","Format",ev.format],["💰","Cost",ev.cost]].map(([ico,lab,val],i)=>val?(

          {ev.why&&<div style={{background:"#f8fafc",borderRadius:14,padding:"14px 16px",marginBottom:14,fontSize:13,lineHeight:1.7,color:"#475569",border:"1px solid #f1f5f9"}}><strong style={{color:"#1e293b"}}>Why attend:</strong> {ev.why}</div>}

          {ev.services&&ev.services.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>{ev.services.map((s,i)=><span key={i} style={{padding:"4px 12px",borderRadius:99,background:"#f1f5f9",color:"#475569",fontSize:12,fontWeight:600}}>{s}</span>)}</div>}
          {ev.actions&&ev.actions.length>0&&<div style={{marginBottom:16}}><strong style={{fontSize:13,color:"#1e293b"}}>Action items:</strong>{ev.actions.map((a,i)=><div key={i} style={{display:"flex",gap:8,marginTop:6,fontSize:13,color:"#475569"}}><span style={{color:"#a5b4fc"}}>•</span><span>{a}</span></div>)}</div>}
          <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:8}}>
            {ev.link&&<a href={ev.link} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"13px",borderRadius:99,background:"linear-gradient(135deg,#6366f1,#7c3aed)",color:"#fff",textDecoration:"none",fontSize:14,fontWeight:700}}>🌐 View Event Page</a>}
            <a href={gcalUrl(ev)} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"13px",borderRadius:99,background:"#fff",color:"#1e293b",textDecoration:"none",fontSize:14,fontWeight:700,border:"1.5px solid #e2e8f0"}}>📅 Add to Google Calendar</a>

/* ─── SearchModal ─── */
function SearchModal({category,onClose,onSearch,memberships}){

  const [cities,setCities]=useState(["sf","eastbay"]);const [sa,setSa]=useState(false);
  const tc=(id)=>{setCities(p=>p.includes(id)?p.filter(c=>c!==id):[...p,id]);setSa(false)};
  const ta=()=>{if(sa){setCities(["sf","eastbay"]);setSa(false)}else{setCities(CITIES.map(c=>c.id));setSa(true)}};
  const today=new Date().toISOString().split("T")[0];
  const valid=cities.length>0&&(dr!=="custom"||(cf&&ct));
  return(
    <div style={ml.overlay} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={ml.card}>
        <div style={ml.header}><div style={{display:"flex",gap:12,alignItems:"center"}}><span style={{fontSize:26}}>{category.icon}</span><div><h2 style={ml.title}>{category.label}</h2><p style={{fontSize:12,color:"#94a3b8",margin:"2px 0 0"}}>{category.desc}</p></div></div><button onClick={onClose} style={ml.closeBtn}>✕</button></div>
        <div style={ml.body}>
          <div style={ml.section}><div style={ml.secLabel}>📅 When?</div><div style={ml.dateGrid}>{DATE_RANGES.map(d=><button key={d.id} onClick={()=>setDr(d.id)} style={{...ml.dateBtn,...(dr===d.id?ml.dateSel:{})}}>{d.label}</button>)}</div>
            {dr==="custom"&&<div style={{display:"flex",gap:10,marginTop:12}}><div style={{flex:1}}><div style={ml.fl}>From</div><input type="date" value={cf} min={today} onChange={e=>setCf(e.target.value)} style={ml.di}/></div><div style={{flex:1}}><div style={ml.fl}>To</div><input type="date" value={ct} min={cf||today} onChange={e=>setCt(e.target.value)} style={ml.di}/></div></div>}
          </div>
          <div style={ml.section}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={ml.secLabel}>📍 Where?</div><button onClick={ta} style={ml.selAll}>{sa?"Deselect all":"Select all"}</button></div>
            <div style={ml.cityGrid}>{CITIES.map(c=>{const on=cities.includes(c.id);return <button key={c.id} onClick={()=>tc(c.id)} style={{...ml.cityBtn,...(on?ml.citySel:{})}}><div style={{...ml.ck,...(on?ml.ckOn:{})}}>{on&&"✓"}</div>{c.label}{c.def&&<span style={ml.hb}>Home</span>}</button>})}</div>
          </div>

          <div style={ml.summary}>📋 Searching <strong>{dr==="custom"?"custom dates":DATE_RANGES.find(d=>d.id===dr).label.toLowerCase()}</strong> in <strong>{cities.length===CITIES.length?"all cities":cities.length+" cit"+(cities.length===1?"y":"ies")}</strong>{memberships&&memberships.length>0&&<> + <strong>{memberships.length} org{memberships.length>1?"s":""}</strong></>}</div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><button onClick={onClose} style={ml.cancelBtn}>Cancel</button><button onClick={()=>{onSearch(buildQuery(category.base,dr,cf,ct,cities,memberships));onClose()}} disabled={!valid} style={{...ml.searchBtn,...(!valid?{opacity:.4,cursor:"default"}:{})}}>🔍 Find Events</button></div>
        </div>
      </div>
    </div>
  );
}

/* ─── FreeSearchModal ─── */
function FreeSearchModal({initialText,onClose,onSearch,memberships}){
  const [txt,setTxt]=useState(initialText||"");const [dr,setDr]=useState("90");const [cf,setCf]=useState("");const [ct,setCt]=useState("");
  const [cities,setCities]=useState(["sf","eastbay"]);const [sa,setSa]=useState(false);
  const tc=(id)=>{setCities(p=>p.includes(id)?p.filter(c=>c!==id):[...p,id]);setSa(false)};
  const ta=()=>{if(sa){setCities(["sf","eastbay"]);setSa(false)}else{setCities(CITIES.map(c=>c.id));setSa(true)}};
  const today=new Date().toISOString().split("T")[0];
  const valid=txt.trim()&&cities.length>0&&(dr!=="custom"||(cf&&ct));
  return(
    <div style={ml.overlay} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={ml.card}>
        <div style={ml.header}><div style={{display:"flex",gap:12,alignItems:"center"}}><span style={{fontSize:26}}>✏️</span><div><h2 style={ml.title}>Custom Search</h2></div></div><button onClick={onClose} style={ml.closeBtn}>✕</button></div>
        <div style={ml.body}>
          <div style={ml.section}><div style={ml.secLabel}>✏️ What?</div><textarea value={txt} onChange={e=>setTxt(e.target.value)} placeholder='e.g. "CRE investor mixers" or "solar conferences"' style={ml.ta} rows={2}/></div>
          <div style={ml.section}><div style={ml.secLabel}>📅 When?</div><div style={ml.dateGrid}>{DATE_RANGES.map(d=><button key={d.id} onClick={()=>setDr(d.id)} style={{...ml.dateBtn,...(dr===d.id?ml.dateSel:{})}}>{d.label}</button>)}</div>
            {dr==="custom"&&<div style={{display:"flex",gap:10,marginTop:12}}><div style={{flex:1}}><div style={ml.fl}>From</div><input type="date" value={cf} min={today} onChange={e=>setCf(e.target.value)} style={ml.di}/></div><div style={{flex:1}}><div style={ml.fl}>To</div><input type="date" value={ct} min={cf||today} onChange={e=>setCt(e.target.value)} style={ml.di}/></div></div>}
          </div>
          <div style={ml.section}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={ml.secLabel}>📍 Where?</div><button onClick={ta} style={ml.selAll}>{sa?"Deselect all":"Select all"}</button></div>
            <div style={ml.cityGrid}>{CITIES.map(c=>{const on=cities.includes(c.id);return <button key={c.id} onClick={()=>tc(c.id)} style={{...ml.cityBtn,...(on?ml.citySel:{})}}><div style={{...ml.ck,...(on?ml.ckOn:{})}}>{on&&"✓"}</div>{c.label}{c.def&&<span style={ml.hb}>Home</span>}</button>})}</div>
          </div>
        </div>
        <div style={ml.footer}>
          <div style={ml.summary}>📋 Searching <strong>{dr==="custom"?"custom dates":DATE_RANGES.find(d=>d.id===dr).label.toLowerCase()}</strong> in <strong>{cities.length===CITIES.length?"all cities":cities.length+" cit"+(cities.length===1?"y":"ies")}</strong></div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><button onClick={onClose} style={ml.cancelBtn}>Cancel</button><button onClick={()=>{onSearch(buildQuery(txt,dr,cf,ct,cities,memberships));onClose();}} disabled={!valid} style={{...ml.searchBtn,...(!valid?{opacity:.4,cursor:"default"}:{})}}>🔍 Find Events</button></div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════ MAIN APP ═══════════ */
function App(){
  const [key,setKey]=useState(()=>{try{return localStorage.getItem("es_key")||""}catch(e){return""}});
  const [memberships,setMemberships]=useState(()=>{try{const s=localStorage.getItem("es_memberships");return s?JSON.parse(s):[]}catch(e){return[]}});
  const [nmn,setNmn]=useState("");const [nmu,setNmu]=useState("");
  const [q,setQ]=useState("");const [events,setEvents]=useState([]);
  const [on,setOn]=useState(false);const [step,setStep]=useState("");const [err,setErr]=useState("");
  const [setup,setSetup]=useState(true);const [vis,setVis]=useState(false);
  const [modalCat,setModalCat]=useState(null);const [freeModal,setFreeModal]=useState(false);
  const [detail,setDetail]=useState(null);
  const ref=useRef(null);const sc=useRef(0);

  const saveMem=(m)=>{setMemberships(m);try{localStorage.setItem("es_memberships",JSON.stringify(m))}catch(e){}};
  const addMem=()=>{if(nmn.trim()){saveMem([...memberships,{name:nmn.trim(),url:nmu.trim()}]);setNmn("");setNmu("")}};
  const remMem=(i)=>{saveMem(memberships.filter((_,j)=>j!==i))};
  const saveKey=()=>{if(key.trim().length>10){try{localStorage.setItem("es_key",key)}catch(e){}setSetup(false)}};

  useEffect(()=>{ref.current&&(ref.current.scrollTop=ref.current.scrollHeight)},[events,on]);
  const sps=["Scanning event calendars...","Checking Bisnow, NAIOP, ULI...","Reviewing speaker lineups...","Filtering in-person only...","Matching service lines...","Ranking by deal potential...","Checking member orgs..."];
  useEffect(()=>{if(!on)return;let i=0;setStep(sps[0]);const iv=setInterval(()=>{i=(i+1)%sps.length;setStep(sps[i])},3200);return()=>clearInterval(iv)},[on]);

  const run=useCallback(async(uq)=>{
    if(!key||!uq.trim())return;setOn(true);setErr("");setEvents([]);sc.current=0;
    let conv=[{role:"user",content:uq}];let fin="";
    try{
      for(let it=0;it<25;it++){
        const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-5-20250929",max_tokens:16000,system:SYSTEM_PROMPT,tools:[{type:"web_search_20250305",name:"web_search",max_uses:20}],messages:conv})});
        if(!r.ok){const e=await r.json().catch(()=>({}));if(r.status===401)throw new Error("Invalid API key.");if(r.status===429)throw new Error("Rate limit — wait and retry.");throw new Error(e?.error?.message||"Error ("+r.status+")");}
        const d=await r.json();
        const textParts=(d.content?.filter(b=>b.type==="text")||[]).map(b=>b.text);
        fin+=textParts.join("\n");
        if(d.stop_reason==="end_turn")break;
        if(d.stop_reason==="tool_use"||d.content?.some(b=>b.type==="server_tool_use"||b.type==="tool_use")){
          sc.current++;setStep("Web search #"+sc.current+"...");conv.push({role:"assistant",content:d.content});
          const tr=d.content.filter(b=>b.type==="server_tool_use"||b.type==="tool_use").map(b=>({type:"tool_result",tool_use_id:b.id,content:"Done."}));
          if(tr.length)conv.push({role:"user",content:tr});continue;
        }break;
      }
      console.log("Raw AI output:",fin);
      const parsed=parseEvents(fin);
      console.log("Parsed events:",parsed);
      if(parsed.length>0)setEvents(parsed);
      else setErr("Could not find events. Try a different category or broader date range.");
    }catch(e){setErr(e.message)}finally{setOn(false)}
  },[key]);

  /* ─── SETUP ─── */
  if(setup)return(
    <div style={S.sWrap}>
      <div style={S.sCard}>
        <div style={S.logo}>🎯</div>
        <h1 style={S.sTitle}>Event Scout</h1>
        <p style={S.sSub}>Find the events that close deals</p>
        <div style={S.box}>
          <div style={S.boxT}>How it works</div>
          {[["1","Get an API key","Visit console.anthropic.com and create one"],["2","Paste it below","Saved in your browser only"],["3","Pick a category","Choose dates and cities, AI searches live calendars"]].map(([n,t,d],i)=>(<div key={i} style={S.howRow}><div style={S.howN}>{n}</div><div><div style={S.howT}>{t}</div><div style={S.howD}>{d}</div></div></div>))}
        </div>
        <div style={{marginBottom:12,textAlign:"left"}}><div style={S.lbl}>API Key</div><div style={{display:"flex",gap:8,marginBottom:12}}><input type={vis?"text":"password"} value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-api03-..." style={S.kIn} onKeyDown={e=>e.key==="Enter"&&saveKey()}/><button onClick={()=>setVis(!vis)} style={S.pill}>{vis?"Hide":"Show"}</button></div></div>
        <div style={{...S.box,marginBottom:12}}>
          <div style={S.boxT}>My Memberships</div>
          <div style={{fontSize:12,color:"#94a3b8",marginBottom:10}}>Private groups whose event calendars the AI should search</div>
          {memberships.map((m,i)=>(<div key={i} style={S.memItem}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:"#1e293b"}}>{m.name}</div>{m.url&&<div style={{fontSize:11,color:"#6366f1"}}>{m.url}</div>}</div><button onClick={()=>remMem(i)} style={S.memX}>✕</button></div>))}
          <div style={{display:"flex",gap:6,marginBottom:6}}><input value={nmn} onChange={e=>setNmn(e.target.value)} placeholder="Organization name" style={{...S.kIn,fontFamily:"inherit",flex:1}} onKeyDown={e=>e.key==="Enter"&&addMem()}/></div>
          <div style={{display:"flex",gap:6}}><input value={nmu} onChange={e=>setNmu(e.target.value)} placeholder="Website URL (optional)" style={{...S.kIn,fontFamily:"inherit",flex:1}} onKeyDown={e=>e.key==="Enter"&&addMem()}/><button onClick={addMem} disabled={!nmn.trim()} style={{...S.pill,color:nmn.trim()?"#6366f1":"#cbd5e1"}}>+ Add</button></div>
        </div>
        <button onClick={saveKey} disabled={key.trim().length<10} style={{...S.goBtn,...(key.trim().length<10?{opacity:.35,cursor:"default"}:{})}}>Get Started →</button>
        <div style={S.note}>~$0.10–0.40 per search in API credits</div>
      </div>
    </div>
  );

  /* ─── MAIN ─── */
  return(
    <div style={S.app} className="no-print">
      {modalCat&&<SearchModal category={modalCat} onClose={()=>setModalCat(null)} onSearch={run} memberships={memberships}/>}
      {freeModal&&<FreeSearchModal initialText={q} onClose={()=>{setFreeModal(false);setQ("")}} onSearch={run} memberships={memberships}/>}
      {detail&&<EventDetail event={detail} onClose={()=>setDetail(null)}/>}

      <div style={S.bar}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={S.barIcon}>🎯</div><span style={S.barT}>Event Scout</span>
          {events.length>0&&<span style={{fontSize:12,color:"#94a3b8",fontWeight:600}}>{events.length} event{events.length!==1?"s":""}</span>}
        </div>
        <div style={{display:"flex",gap:6}}>
          {events.length>0&&<button onClick={()=>printEvents(events)} style={S.barBtn}>🖨️ Print</button>}
          <button onClick={()=>{setEvents([]);setErr("")}} style={S.barBtn}>New</button>
          <button onClick={()=>setSetup(true)} style={S.barBtn}>⚙️</button>
        </div>
      </div>

      <div style={S.mid} ref={ref}>
        {events.length===0&&!on&&!err&&(
          <div style={S.hero}>
            <div style={{fontSize:48,marginBottom:10}}>🎯</div>
            <h2 style={S.heroT}>Find Your Next Deal</h2>
            <p style={S.heroS}>Pick a category. Choose your dates and cities. Get a ranked list of events where your next clients will be.</p>
            <div style={S.qList}>
              {CATEGORIES.map((x,i)=>(
                <button key={i} onClick={()=>setModalCat(x)} style={S.qBtn}>
                  <span style={{fontSize:20}}>{x.icon}</span>
                  <span style={{flex:1,textAlign:"left",fontWeight:700,fontSize:14}}>{x.label}</span>
                  <span style={{color:"#c7d2fe",fontSize:18}}>›</span>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* ─── EVENT RESULTS LIST ─── */}
        {events.length>0&&(
          <div style={{padding:"8px 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h2 style={{fontSize:18,fontWeight:800,color:"#0f172a",letterSpacing:"-0.03em"}}>Your Events</h2>
              <button onClick={()=>printEvents(events)} style={{padding:"6px 14px",borderRadius:99,border:"1.5px solid #e2e8f0",background:"#fff",color:"#475569",cursor:"pointer",fontSize:12,fontWeight:600}}>🖨️ Print All</button>
            </div>
            {events.map((ev,i)=>{
              const p=PRIORITY[ev.priority]||PRIORITY["worth-considering"];
              return(
                <button key={i} onClick={()=>setDetail(ev)} style={{...S.evCard,animationDelay:i*60+"ms"}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:12,width:"100%"}}>
                    <div style={{width:42,height:42,borderRadius:12,background:p.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,border:"1.5px solid "+p.bd}}>{p.emoji}</div>
                    <div style={{flex:1,textAlign:"left",minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:700,color:"#0f172a",marginBottom:3,lineHeight:1.3}}>{ev.name}</div>
                      <div style={{fontSize:12,color:"#64748b",display:"flex",flexWrap:"wrap",gap:4}}>
                        {ev.date&&<span>📅 {ev.date}</span>}
                        {ev.location&&<span> · 📍 {ev.location}</span>}
                      </div>
                      {ev.services&&ev.services.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>{ev.services.slice(0,3).map((s,j)=><span key={j} style={{padding:"2px 8px",borderRadius:99,background:"#f1f5f9",color:"#64748b",fontSize:10,fontWeight:600}}>{s}</span>)}</div>}
                    </div>
                    <span style={{color:"#c7d2fe",fontSize:20,flexShrink:0,alignSelf:"center"}}>›</span>
                  </div>
                </button>
              );
            })}
          </div>
        )}

        {on&&<div style={{padding:"20px 0"}}><div style={S.loadC}><div style={S.sp}/><div><div style={S.ldT}>Searching for events...</div><div style={S.ldS}>{step}</div></div></div></div>}
        {err&&<div style={S.errB}><strong>⚠️</strong> {err}</div>}
      </div>

      <div style={S.foot}>
        {events.length>0&&!on&&<div style={S.chips}>{CATEGORIES.slice(0,4).map((x,i)=><button key={i} onClick={()=>setModalCat(x)} style={S.chipB}>{x.icon} {x.label}</button>)}</div>}
        <div style={{display:"flex",gap:8}}>
          <input type="text" value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!on&&q.trim())setFreeModal(true)}} placeholder='Type a search and press Enter...' style={S.tIn} disabled={on}/>
          <button onClick={()=>q.trim()&&setFreeModal(true)} disabled={on||!q.trim()} style={{...S.sendB,...(on||!q.trim()?{opacity:.35,cursor:"default"}:{})}}>
            {on?<div style={S.mSp}/>:"→"}
          </button>
        </div>
      </div>
    </div>
  );
}

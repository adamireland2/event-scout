## WHO YOU WORK FOR

Your principal runs a specialty tax consulting practice that sells the following studies and services to property owners, developers, manufacturers, software companies, and their advisors:

- **Cost Segregation Studies** — accelerated depreciation for commercial real estate owners and investors
- **179D Energy Efficient Commercial Building Deductions** — for building owners, designers, architects, and engineers who design energy-efficient commercial/government buildings
- **45L Energy Efficient Home Credits** — for developers and builders of energy-efficient residential units (including multifamily)
- **ITC / UTC (Investment Tax Credit / Utility Tax Credits)** — for renewable energy, solar, storage, and qualifying equipment investments
- **R&D Tax Credit Studies** — for manufacturers, software companies, engineers, and any business that develops or improves products, processes, software, or formulas

## YOUR PRINCIPAL'S GEOGRAPHY

- **Home base:** San Francisco Bay Area / San Jose, California
- **Travel radius:** Bay Area is top priority. Also include major US cities the principal can reasonably fly to for a high-value event.
- **Always flag Bay Area events first**, then sort remaining events by ROI-to-travel-effort ratio

## THE DECISION MAKERS YOU ARE HUNTING

### Tier 1 — Direct Buyers (highest priority)
- Commercial real estate developers and owners (office, multifamily, retail, industrial, mixed-use, hospitality)
- Real estate investors, family offices, and PE firms with real estate or manufacturing portfolios
- Owners and C-suite of manufacturing companies (especially with facilities, equipment, or product development)
- CFOs, Controllers, VP of Tax, and Tax Directors at mid-market and growth-stage companies
- Owners and founders of software/SaaS companies with meaningful R&D spend
- General contractors and design-build firm principals
- Architects and engineers at firms that design commercial or government buildings (179D referral sources)
- Renewable energy developers and solar/storage companies (ITC)
- Multifamily and residential developers and builders (45L)

### Tier 2 — Referral Sources & Influencers (high priority)
- CPAs and tax partners at regional and national accounting firms
- Real estate attorneys and tax attorneys
- Wealth advisors and financial planners who serve HNW clients with real estate or business holdings
- Commercial real estate brokers
- Construction lenders and commercial mortgage brokers
- Property managers at scale

### Tier 3 — Strategic Network (moderate priority)
- Economic development officials and government incentive officers
- Industry association leaders (NAIOP, ULI, ICSC, BOMA, AGC, NAM, local chambers, etc.)
- Commercial insurance brokers who serve property owners and manufacturers

## EVENT TYPES TO FIND — RANKED BY VALUE

### A-Tier Events (always recommend)
1. Industry conferences with named speakers who are Tier 1 or Tier 2 decision makers — events like Bisnow conferences.
2. Small-format executive roundtables and invite-only dinners (20-80 people).
3. Trade association annual conferences — NAIOP, ULI, ICSC, BOMA, AGC, NAM, AICPA, CPA society events.
4. Commercial real estate networking events — deal-making mixers, capital markets summits.

### B-Tier Events (recommend with context)
5. Construction and design expos.
6. Manufacturing trade shows — especially innovation, automation, reshoring, or facilities investment.
7. Technology and SaaS founder events — growth-stage companies with R&D eligibility.
8. Tax and accounting industry events — CPE conferences, state CPA society meetings.
9. Sustainability and energy events — green building, solar/storage (ITC/179D).
10. Small business events — where SMB owners who "make things" gather.

## HOW TO EVALUATE AN EVENT

### Must-Have Signals (at least 2)
- Published speaker/panelist list with Tier 1 or 2 targets
- Attendee profile mentions the decision maker types above
- In-person format with structured networking
- Located in a specified target city

### Strong Positive Signals
- Produced by Bisnow, GlobeSt, Connect CRE, NAIOP, ULI, ICSC, BOMA, AGC, NAM, AICPA, state CPA societies
- Speakers include owners, developers, investors, or C-suite
- 200+ attendees or intentionally curated
- Topics touch cost recovery, capital investment, construction, manufacturing, energy efficiency
- Sponsorship/exhibitor opportunities available

### Red Flags (IMMEDIATELY SKIP — do not include in results)
- Virtual-only, online-only, webinar, livestream, or "hybrid" events with no meaningful in-person component
- Events described as "Zoom", "Teams", "virtual", "online", "digital", "remote", or "web conference"
- Attendees primarily students or early-career
- Single vendor sales pitch
- No published agenda or speaker list

## CRITICAL RULE: IN-PERSON EVENTS ONLY

This is the single most important rule. The principal is ONLY interested in events where they will physically be in a room with other people. Apply these filters strictly:

- ONLY recommend events that are explicitly described as "in-person", "in person", "live", or list a physical venue/address
- NEVER recommend webinars, virtual events, online summits, Zoom calls, livestreams, digital conferences, or any event that takes place on a screen
- If an event is "hybrid" (both in-person and virtual), you may include it ONLY if the in-person component has real structured networking, a physical venue, and is clearly designed for attendees to meet face-to-face
- If you cannot confirm an event is in-person from the event page, DO NOT include it
- When searching, add "in-person" or "in person" to your search queries to filter results
- In your output, always confirm the physical venue or location for each recommended event
- If an event listing does not mention a venue, address, or physical location, SKIP IT

## MEMBER ORGANIZATION EVENT CALENDARS

The principal belongs to private professional organizations whose events may not appear in public search results. When these organizations are provided, you MUST:

1. Search each organization's website and event calendar directly (use their URL + "events" or "calendar")
2. Look for upcoming in-person meetings, socials, mixers, luncheons, home group meetings, affinity group events, and conferences
3. These member-org events are EXTREMELY high-value because the rooms are pre-filled with vetted professionals and referral sources
4. Always include relevant member-org events in your results, and flag them with a note that says "Member Organization Event" so the principal knows they have priority access

## OUTPUT FORMAT

For each event:

### [Event Name]
**Date:** [Date]
**Location:** [City, Venue if known]
**Produced by:** [Organizer]
**Link:** [URL]
**Format:** [Conference / Roundtable / Expo / Mixer]
**Cost:** [Fee or "TBD" / "Invite-only"]

**Why this event:**
[2-3 sentences]

**Decision makers likely in the room:**
[Tier 1 and 2 categories. Name speakers if available.]

**Relevant service lines:**
[Cost Seg / 179D / 45L / ITC / R&D]

**Priority:** [🔴 Must-attend / 🟡 Strong fit / 🟢 Worth considering]

**Action items:**
- Register by [deadline]
- Review speaker list for outreach targets
- [Other steps]

## SEARCH STRATEGY
Search: Bisnow, NAIOP, ULI, ICSC, Connect CRE, GlobeSt, CalCPA, AICPA, AGC, NAM, BOMA, Eventbrite, business journals, LinkedIn Events. ALSO search any member organization URLs provided by the principal. Always include "in-person" or "in person" in search queries to filter out virtual events.

## BEHAVIORAL RULES
1. IN-PERSON ONLY. Never recommend virtual, online, or webinar events. If you cannot confirm a physical venue, skip it.
2. Verify events are real — future date, working link, registration open.
3. Quality over quantity — 5 perfect beats 20 marginal.
4. Name names from speaker lists.
5. Think: "will the principal leave with 3-5 conversations that could become $50K+ engagements?"
6. Flag sponsorship and speaking opportunities.
7. Bundle events in the same city when timing aligns.
8. Map each event to specific service lines.
9. Search thoroughly across all sectors AND member organization calendars.
10. Always search member organization event calendars when provided — these are high-priority.`;

/* ─── Markdown ─── */
function renderMD(text){
  if(!text)return null;
  return text.split("\\n").map((line,i)=>{
    if(line.startsWith("### "))return React.createElement("h3",{key:i,style:md.h3},inl(line.slice(4)));
    if(line.startsWith("## "))return React.createElement("h2",{key:i,style:md.h2},inl(line.slice(3)));
    if(line.startsWith("# "))return React.createElement("h1",{key:i,style:md.h1},inl(line.slice(2)));
    if(/^- \\[[ x]\\] /.test(line)){const ck=line[3]==="x";return React.createElement("div",{key:i,style:md.ckRow},React.createElement("div",{style:{...md.ckBox,...(ck?md.ckOn:{})}},ck&&"✓"),React.createElement("span",null,inl(line.slice(6))));}
    if(line.startsWith("- "))return React.createElement("div",{key:i,style:md.li},React.createElement("span",{style:md.dot}),React.createElement("span",null,inl(line.slice(2))));
    if(line.startsWith("---"))return React.createElement("hr",{key:i,style:md.hr});
    if(!line.trim())return React.createElement("div",{key:i,style:{height:6}});
    return React.createElement("p",{key:i,style:md.p},inl(line));
  });
}
function inl(t){
  const p=[];const rx=/(\\*\\*(.+?)\\*\\*)|(\\[(.+?)\\]\\((.+?)\\))|(🔴|🟡|🟢)/g;
  let l=0,m,k=0;
  while((m=rx.exec(t))!==null){
    if(m.index>l)p.push(t.slice(l,m.index));
    if(m[1])p.push(React.createElement("strong",{key:"b"+k,style:md.b},m[2]));
    else if(m[3])p.push(React.createElement("a",{key:"a"+k,href:m[5],target:"_blank",rel:"noopener noreferrer",style:md.a},m[4]));
    else if(m[6]){const c={"🔴":["#fef2f2","#dc2626","#fecaca"],"🟡":["#fefce8","#a16207","#fde68a"],"🟢":["#f0fdf4","#15803d","#bbf7d0"]}[m[6]];const lb={"🔴":"Must-attend","🟡":"Strong fit","🟢":"Worth considering"}[m[6]];p.push(React.createElement("span",{key:"e"+k,style:{...md.badge,background:c[0],color:c[1],borderColor:c[2]}},m[6]+" "+lb));}
    l=m.index+m[0].length;k++;
  }
  if(l<t.length)p.push(t.slice(l));return p;
}
const md={
  h1:{fontSize:20,fontWeight:800,color:"#0f172a",margin:"28px 0 12px",letterSpacing:"-0.03em"},
  h2:{fontSize:17,fontWeight:700,color:"#334155",margin:"22px 0 10px"},

  li:{display:"flex",gap:10,marginBottom:5,paddingLeft:2},

/* ─── Shared date/city picker logic ─── */
function buildQuery(base,dateRange,customFrom,customTo,cities,memberships){
  let ds;
  if(dateRange==="custom"&&customFrom&&customTo){
    ds="between "+new Date(customFrom).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})+" and "+new Date(customTo).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
  } else { ds="in the next "+parseInt(dateRange)+" days"; }
  const cn=cities.map(id=>{const c=CITIES.find(x=>x.id===id);return c?c.label:null}).filter(Boolean);
  const cs=cn.length===CITIES.length?"all major US cities":cn.length>3?cn.slice(0,3).join(", ")+", and "+(cn.length-3)+" other cities":cn.join(" and ");
  let q=base+" "+ds+" in "+cs+". IN-PERSON EVENTS ONLY — do not include any virtual, online, or webinar events. Every event must have a physical venue. Check Bisnow, NAIOP, ULI, Connect CRE, GlobeSt, AICPA, CalCPA, AGC, NAM, Eventbrite, and business journal calendars.";
  if(memberships&&memberships.length>0){
    q+=" ALSO search these member organization event calendars (I am a member of these groups — check their websites for upcoming in-person events, meetings, socials, and mixers): "+memberships.map(m=>m.name+(m.url?" ("+m.url+")":"")).join("; ")+".";
  }
  return q;
}

        </div>
        <div style={ml.footer}>
          <div style={ml.summary}>
            <span>📋</span>
            <span style={ml.summaryText}>Searching <strong>{dateRange==="custom"?"custom dates":DATE_RANGES.find(d=>d.id===dateRange).label.toLowerCase()}</strong> in <strong>{cities.length===CITIES.length?"all cities":cities.length+" "+(cities.length===1?"city":"cities")}</strong>{memberships&&memberships.length>0&&<> + <strong>{memberships.length} member org{memberships.length>1?"s":""}</strong></>} · In-person only</span>

          </div>
        </div>
      </div>
    </div>
  );
}

          </div>
          <div style={ml.footBtns}>
            <button onClick={onClose} style={ml.cancelBtn}>Cancel</button>
            <button onClick={()=>{onSearch(buildQuery(txt,dateRange,customFrom,customTo,cities,memberships));onClose()}} disabled={!valid} style={{...ml.searchBtn,...(!valid?{opacity:.4,cursor:"default"}:{})}}>🔍 Find Events</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════ MAIN APP ═══════════════════════ */
function App(){
  const [key,setKey]=useState(()=>{try{return localStorage.getItem("es_key")||""}catch(e){return""}});
  const [memberships,setMemberships]=useState(()=>{try{const s=localStorage.getItem("es_memberships");return s?JSON.parse(s):[]}catch(e){return[]}});
  const [newMemName,setNewMemName]=useState("");
  const [newMemUrl,setNewMemUrl]=useState("");
  const [q,setQ]=useState("");const [msgs,setMsgs]=useState([]);
  const [on,setOn]=useState(false);const [step,setStep]=useState("");const [err,setErr]=useState("");
  const [setup,setSetup]=useState(true);const [vis,setVis]=useState(false);
  const [modalCat,setModalCat]=useState(null);const [freeModal,setFreeModal]=useState(false);
  const ref=useRef(null);const sc=useRef(0);

  const saveMemberships=(m)=>{setMemberships(m);try{localStorage.setItem("es_memberships",JSON.stringify(m))}catch(e){}};
  const addMembership=()=>{if(newMemName.trim()){saveMemberships([...memberships,{name:newMemName.trim(),url:newMemUrl.trim()}]);setNewMemName("");setNewMemUrl("")}};
  const removeMembership=(i)=>{saveMemberships(memberships.filter((_,j)=>j!==i))};

  useEffect(()=>{ref.current&&(ref.current.scrollTop=ref.current.scrollHeight)},[msgs,on]);
  const sps=["Scanning event calendars...","Checking Bisnow, NAIOP, ULI...","Reviewing speaker lineups...","Evaluating networking ROI...","Matching service lines...","Ranking by deal potential...","Filtering for in-person only...","Checking member organization events..."];
  useEffect(()=>{if(!on)return;let i=0;setStep(sps[0]);const iv=setInterval(()=>{i=(i+1)%sps.length;setStep(sps[i])},3200);return()=>clearInterval(iv)},[on]);

  const saveKey=()=>{if(key.trim().length>10){try{localStorage.setItem("es_key",key)}catch(e){}setSetup(false)}};

  const run=useCallback(async(uq)=>{
    if(!key||!uq.trim())return;setOn(true);setErr("");sc.current=0;
    setMsgs(p=>[...p,{role:"user",content:uq}]);setQ("");
    let conv=[{role:"user",content:uq}];let fin="";
    try{
      for(let it=0;it<25;it++){
        const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-5-20250929",max_tokens:16000,system:SYSTEM_PROMPT,tools:[{type:"web_search_20250305",name:"web_search",max_uses:20}],messages:conv})});
        if(!r.ok){const e=await r.json().catch(()=>({}));if(r.status===401)throw new Error("Invalid API key — double-check and try again.");if(r.status===429)throw new Error("Rate limit — wait a moment and retry.");throw new Error(e?.error?.message||"Error ("+r.status+")");}
        const d=await r.json();fin+=(d.content?.filter(b=>b.type==="text")||[]).map(b=>b.text).join("\\n");
        if(d.stop_reason==="end_turn")break;
        if(d.stop_reason==="tool_use"||d.content?.some(b=>b.type==="server_tool_use"||b.type==="tool_use")){
          sc.current++;setStep("Web search #"+sc.current+"...");conv.push({role:"assistant",content:d.content});
          const tr=d.content.filter(b=>b.type==="server_tool_use"||b.type==="tool_use").map(b=>({type:"tool_result",tool_use_id:b.id,content:"Done."}));
          if(tr.length)conv.push({role:"user",content:tr});continue;
        }break;
      }
      setMsgs(p=>[...p,{role:"assistant",content:fin.trim()||"No results — try a more specific search."}]);
    }catch(e){setErr(e.message)}finally{setOn(false)}
  },[key]);

  /* ─── SETUP ─── */
  if(setup)return(
    <div style={S.sWrap}>
      <div style={S.sCard}>
        <div style={S.logo}>🎯</div>
        <h1 style={S.sTitle}>Event Scout</h1>
        <p style={S.sSub}>Find the events that close deals</p>
        <div style={S.howBox}>
          <div style={S.howTitle}>How it works</div>
          {[["1","Get an API key","Visit console.anthropic.com → API Keys and create one"],["2","Paste it below","Your key is saved in this browser only — never sent anywhere else"],["3","Pick a category","Choose your dates and cities, then the AI searches live event calendars"]].map(([n,t,d],i)=>(
            <div key={i} style={S.howRow}><div style={S.howN}>{n}</div><div><div style={S.howT}>{t}</div><div style={S.howD}>{d}</div></div></div>
          ))}
        </div>
        <div style={{marginBottom:14}}>
          <div style={S.lbl}>Your API Key</div>
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <input type={vis?"text":"password"} value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-api03-..." style={S.kIn} onKeyDown={e=>e.key==="Enter"&&saveKey()}/>
            <button onClick={()=>setVis(!vis)} style={S.pill}>{vis?"Hide":"Show"}</button>
          </div>
        </div>

        <div style={S.memBox}>
          <div style={S.memHeader}>
            <div style={S.lbl}>My Memberships</div>
            <div style={{fontSize:12,color:"#94a3b8",fontWeight:400,marginBottom:8,textAlign:"left",textTransform:"none",letterSpacing:"normal"}}>Add groups you belong to so the agent searches their private event calendars</div>
          </div>
          {memberships.length>0&&(
            <div style={{marginBottom:12}}>
              {memberships.map((m,i)=>(
                <div key={i} style={S.memItem}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#1e293b"}}>{m.name}</div>
                    {m.url&&<div style={{fontSize:11,color:"#6366f1",wordBreak:"break-all"}}>{m.url}</div>}
                  </div>
                  <button onClick={()=>removeMembership(i)} style={S.memRemove}>✕</button>
                </div>
              ))}
            </div>
          )}
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <input value={newMemName} onChange={e=>setNewMemName(e.target.value)} placeholder="Organization name" style={{...S.kIn,fontFamily:"inherit",flex:1}} onKeyDown={e=>e.key==="Enter"&&addMembership()}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <input value={newMemUrl} onChange={e=>setNewMemUrl(e.target.value)} placeholder="Website URL (optional)" style={{...S.kIn,fontFamily:"inherit",flex:1}} onKeyDown={e=>e.key==="Enter"&&addMembership()}/>
            <button onClick={addMembership} disabled={!newMemName.trim()} style={{...S.pill,color:newMemName.trim()?"#6366f1":"#cbd5e1",cursor:newMemName.trim()?"pointer":"default"}}>+ Add</button>
          </div>
        </div>

        <div style={{marginBottom:14}}>
          <button onClick={saveKey} disabled={key.trim().length<10} style={{...S.bigPill,...(key.trim().length<10?{opacity:.35,cursor:"default"}:{})}}>Get Started →</button>
        </div>
        <div style={S.note}>~$0.10–0.40 per search in API credits</div>
      </div>
    </div>
  );

  /* ─── MAIN ─── */
  return(
    <div style={S.app}>
      {modalCat&&<SearchModal category={modalCat} onClose={()=>setModalCat(null)} onSearch={run} memberships={memberships}/>}
      {freeModal&&<FreeSearchModal initialText={q} onClose={()=>{setFreeModal(false);setQ("")}} onSearch={run} memberships={memberships}/>}

      <div style={S.bar}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={S.barIcon}>🎯</div>
          <span style={S.barT}>Event Scout</span>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setMsgs([])} style={S.barBtn}>New Search</button>
          <button onClick={()=>{setSetup(true)}} style={S.barBtn}>Settings</button>
        </div>
      </div>

      <div style={S.mid} ref={ref}>
        {msgs.length===0&&!on&&(
          <div style={S.hero}>
            <div style={{fontSize:56,marginBottom:12}}>🎯</div>
            <h2 style={S.heroT}>What events should you attend?</h2>
            <p style={S.heroS}>Pick a category, choose your dates and cities, and the AI will search live event calendars to find where your next clients will be.</p>
            <div style={S.qList}>
              {CATEGORIES.map((x,i)=>(
                <button key={i} onClick={()=>setModalCat(x)} style={S.qBtn}>
                  <span style={{fontSize:22}}>{x.icon}</span>
                  <div style={{flex:1,textAlign:"left"}}>
                    <div style={{fontWeight:700}}>{x.label}</div>
                    <div style={{fontSize:12,color:"#94a3b8",fontWeight:450,marginTop:2}}>{x.desc}</div>
                  </div>
                  <span style={{color:"#c7d2fe",fontSize:18,flexShrink:0}}>›</span>
                </button>
              ))}
            </div>
          </div>
        )}

        {msgs.map((m,i)=>m.role==="user"?(
          <div key={i} style={S.uWrap}><div style={S.uB}><p style={S.uT}>{m.content}</p></div></div>
        ):(
          <div key={i} style={{marginBottom:28}}><div style={S.aB}>
            <div style={S.aH}><span style={{fontSize:16}}>🎯</span><span style={S.aN}>Event Scout</span></div>
            <div style={S.aC}>{renderMD(m.content)}</div>
          </div></div>
        ))}

        {on&&<div style={{padding:"12px 0"}}><div style={S.loadC}><div style={S.sp}/><div><div style={S.ldT}>Searching for events...</div><div style={S.ldS}>{step}</div></div></div></div>}
        {err&&<div style={S.errB}><strong>⚠️</strong> {err}</div>}
      </div>

      <div style={S.foot}>
        {msgs.length>0&&!on&&<div style={S.chips}>{CATEGORIES.slice(0,4).map((x,i)=><button key={i} onClick={()=>setModalCat(x)} style={S.chipB}>{x.icon} {x.label}</button>)}</div>}
        <div style={{display:"flex",gap:10}}>
          <input type="text" value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!on&&q.trim())setFreeModal(true)}} placeholder='Type a search and press Enter to set dates & cities...' style={S.tIn} disabled={on}/>
          <button onClick={()=>q.trim()&&setFreeModal(true)} disabled={on||!q.trim()} style={{...S.sendB,...(on||!q.trim()?{opacity:.35,cursor:"default"}:{})}}>
            {on?<div style={S.mSp}/>:"→"}
          </button>
        </div>
      </div>
    </div>
  );
}
